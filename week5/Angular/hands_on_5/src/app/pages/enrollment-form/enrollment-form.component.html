<div class="form-container-card">
  <h2>Course Enrollment Request</h2>
  <p class="subtitle">Please fill out this form to submit your enrollment request.</p>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" novalidate>
    <!-- Success Message -->
    <div *ngIf="submitted" class="success-alert">
      Enrollment request submitted successfully!
    </div>

    <!-- Student Name -->
    <div class="form-group">
      <label for="studentName">Student Full Name</label>
      <input 
        type="text" 
        id="studentName" 
        name="studentName" 
        [(ngModel)]="studentName" 
        #nameCtrl="ngModel"
        required 
        minlength="3" 
        placeholder="Enter your full name"
        class="form-control">
      <div *ngIf="nameCtrl.touched && nameCtrl.errors" class="error-msg">
        <span *ngIf="nameCtrl.errors['required']">Name is required.</span>
        <span *ngIf="nameCtrl.errors['minlength']">Name must be at least 3 characters.</span>
      </div>
    </div>

    <!-- Student Email -->
    <div class="form-group">
      <label for="studentEmail">Email Address</label>
      <input 
        type="email" 
        id="studentEmail" 
        name="studentEmail" 
        [(ngModel)]="studentEmail" 
        #emailCtrl="ngModel"
        required 
        email 
        placeholder="username@domain.com"
        class="form-control">
      <div *ngIf="emailCtrl.touched && emailCtrl.errors" class="error-msg">
        <span *ngIf="emailCtrl.errors['required']">Email is required.</span>
        <span *ngIf="emailCtrl.errors['email']">Please enter a valid email.</span>
      </div>
    </div>

    <!-- Course ID -->
    <div class="form-group">
      <label for="courseId">Course ID</label>
      <input 
        type="number" 
        id="courseId" 
        name="courseId" 
        [(ngModel)]="courseId" 
        #courseCtrl="ngModel"
        required 
        placeholder="e.g. 101"
        class="form-control">
      <div *ngIf="courseCtrl.touched && courseCtrl.errors" class="error-msg">
        <span *ngIf="courseCtrl.errors['required']">Course ID is required.</span>
      </div>
    </div>

    <!-- Preferred Semester -->
    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select 
        id="preferredSemester" 
        name="preferredSemester" 
        [(ngModel)]="preferredSemester" 
        class="form-control">
        <option value="Odd">Odd Semester</option>
        <option value="Even">Even Semester</option>
      </select>
    </div>

    <!-- Agree to Terms -->
    <div class="form-group-checkbox">
      <input 
        type="checkbox" 
        id="agreeToTerms" 
        name="agreeToTerms" 
        [(ngModel)]="agreeToTerms" 
        #termsCtrl="ngModel"
        required 
        class="form-checkbox">
      <label for="agreeToTerms">I agree to the academic terms and conditions.</label>
      <div *ngIf="termsCtrl.touched && !agreeToTerms" class="error-msg checkbox-error">
        You must accept the terms to proceed.
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions-row">
      <button type="button" class="btn btn-secondary" (click)="enrollForm.resetForm(); submitted = false">
        Reset
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="enrollForm.invalid">
        Submit
      </button>
    </div>
  </form>
</div>
