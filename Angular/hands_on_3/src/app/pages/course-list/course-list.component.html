<div class="course-list-container">
  <header class="list-header">
    <h2>Available Academic Courses</h2>
    <p>Select a course below to request enrollment.</p>
  </header>

  <div class="course-grid">
    <app-course-card 
      *ngFor="let c of courses" 
      [course]="c" 
      (enrollRequested)="onEnroll($event)">
    </app-course-card>
  </div>

  <div *ngIf="selectedCourseId" class="selected-course-info">
    Selected course ID: {{ selectedCourseId }}
  </div>
</div>
